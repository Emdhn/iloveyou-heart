<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Heart</title>
<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
}
span{
    position:absolute;
    color:#ff9ecf;
    font-family:Arial,sans-serif;
    text-shadow:0 0 10px #ff4fa3,0 0 20px #ff4fa3;
    user-select:none;
}
</style>
</head>
<body>

<script>
for(let t=0;t<Math.PI*2;t+=0.12){
    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let s=document.createElement("span");
    s.innerText="I love you";
    s.style.left=(x*18 + window.innerWidth/2)+"px";
    s.style.top=(y*18 + window.innerHeight/2)+"px";
    document.body.appendChild(s);
}
</script>

</body>
</html>
